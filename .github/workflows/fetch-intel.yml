name: Fetch Threat Intel

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:       # manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install geoip2

      - name: Download MaxMind GeoLite2 databases
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          [ -z "$MAXMIND_LICENSE_KEY" ] && echo "Skipping MaxMind (MAXMIND_LICENSE_KEY not set)" && exit 0
          for DB in GeoLite2-City GeoLite2-ASN; do
            DIR=$(mktemp -d)
            curl -sS "https://download.maxmind.com/app/geoip_download?edition_id=${DB}&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" \
              | tar -xz -C "$DIR"
            find "$DIR" -name "*.mmdb" -exec cp {} . \;
            rm -rf "$DIR"
            echo "${DB}.mmdb ready"
          done

      - name: Fetch IOCs
        env:
          ABUSEIPDB_KEY: ${{ secrets.ABUSEIPDB_KEY }}
        run: python3 scripts/fetch_iocs.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/iocs.json
          git diff --staged --quiet || git commit -m "chore: refresh threat intel data"
          git pull --rebase origin main
          git push
